<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Smart Teacher — Présentation de Cours</title>

  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layout.css">
</head>
<body>
  <div id="appPanel">
    <header id="headerContainer" class="header"></header>

    <main class="main">
      <section class="panel active" id="panel-course">
        <div id="slideViewerContainer" class="slide-area"></div>
        <div id="chatPanelContainer" class="chat-col collapsed"></div>
      </section>

      <section class="panel" id="panel-library">
        <div class="lib">
          <div class="up-zone" id="dz">
            <input type="file" id="fi" multiple accept=".pdf,.docx,.pptx,.txt">
            <div class="up-icon">📄</div>
            <div class="up-txt"><strong>Glissez vos cours ici</strong> ou cliquez</div>
            <div class="up-txt" style="margin-top:4px;font-size:.78em">PDF · DOCX · PPTX · TXT</div>
          </div>

          <div id="finfo"></div>

          <div class="opts">
            <div class="og">
              <div class="ol">🌐 Language</div>
              <select class="os" id="bLang">
                <option value="fr">Français</option>
                <option value="en">English</option>
              </select>
            </div>
            <div class="og">
              <div class="ol">🎓 Niveau</div>
              <select class="os" id="bLevel">
                <option value="lycée">Lycée</option>
                <option value="collège">Collège</option>
                <option value="université">Université</option>
              </select>
            </div>
          </div>

          <button class="btn-build" id="buildBtn" disabled>📤 Importer le cours pour présentation</button>

          <div class="bp" id="bprog">
            <div class="ps" id="bstat">Construction…</div>
            <div class="pb"><div class="pf" id="pfill"></div></div>
          </div>

          <div class="sec-ttl">Cours disponibles</div>
          <div id="courseSelectorContainer"></div>
        </div>
      </section>

      <section class="panel" id="panel-qa">
        <div id="qaPanelContainer" class="qa-panel"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
